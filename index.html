<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1d4ed8">
<link rel="manifest" href="manifest.json">
<title>TAJIMA 生産管理</title>
<style>
:root{
  --bg:#eaf3ff;--card:#ffffff;--blue:#2563eb;--deep:#1e3a8a;--text:#0f172a;
  --soft:#eff6ff;--line:#bfdbfe;--red:#ef4444;--green:#16a34a;--orange:#f59e0b;
}
*{box-sizing:border-box}
body{
  margin:0;background:linear-gradient(180deg,#dbeafe,#eff6ff);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  padding:12px;
}
.app{max-width:780px;margin:0 auto;padding-bottom:96px}
.header{
  background:var(--card);border:2px solid var(--blue);border-radius:22px;padding:16px;
  box-shadow:0 10px 24px rgba(37,99,235,.16);position:sticky;top:8px;z-index:5
}
h1{margin:0;text-align:center;color:var(--deep);font-size:25px;letter-spacing:.5px}
.month-row{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.month-title{min-width:120px;text-align:center;font-weight:900;color:var(--deep);font-size:18px}
.state{margin-top:8px;text-align:center;font-size:13px;font-weight:800}
.state.saved{color:var(--green)}.state.dirty{color:#b45309}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}
.sum{background:var(--card);border:2px solid var(--line);border-radius:16px;padding:10px;text-align:center}
.sum span{display:block;font-size:12px;color:#64748b}.sum b{display:block;font-size:21px;color:var(--deep)}
.toolbar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.search{grid-column:1/3;background:var(--card);border:2px solid var(--line);border-radius:14px;padding:12px;font-size:17px;outline:none}
.card{
  background:var(--card);border:2px solid var(--blue);border-radius:22px;padding:14px;margin-bottom:14px;
  box-shadow:0 8px 22px rgba(37,99,235,.13)
}
.top{display:flex;gap:10px;align-items:center;margin-bottom:12px}
.name{flex:1;border:0;outline:0;background:var(--soft);border-radius:14px;padding:10px 12px;font-size:24px;font-weight:900;color:var(--deep)}
.remain{
  border-radius:16px;padding:14px;text-align:center;font-weight:900;font-size:26px;margin-bottom:12px;
  background:#dbeafe;color:var(--deep)
}
.remain.short{background:#fee2e2;color:#991b1b}.remain.over{background:#dcfce7;color:#166534}
.progress{height:14px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin-bottom:12px}
.bar{height:100%;width:0;background:var(--blue);border-radius:999px;transition:.15s}
.rate{text-align:right;font-size:12px;color:#64748b;margin-top:-8px;margin-bottom:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{background:var(--soft);border-radius:16px;padding:11px}
.label{font-size:12px;color:#64748b;margin-bottom:4px;font-weight:700}
.num{width:100%;border:0;outline:0;background:transparent;font-size:25px;font-weight:900;color:var(--text)}
button{border:0;border-radius:13px;padding:11px 12px;font-size:15px;font-weight:900;cursor:pointer}
.btn-blue{background:var(--blue);color:white}.btn-light{background:var(--soft);color:var(--deep);border:2px solid var(--line)}.btn-red{background:var(--red);color:white}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.bottom{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.94);border-top:2px solid var(--line);padding:10px 12px;backdrop-filter:blur(10px);z-index:9}
.bottom-inner{max-width:780px;margin:auto;display:flex;gap:10px;align-items:center}
.save{flex:1;background:var(--green);color:white;font-size:18px;padding:14px}
.bottom-text{font-size:13px;color:#64748b;min-width:120px}
.note{text-align:center;color:#64748b;font-size:12px;line-height:1.6;margin:14px 0}
@media(max-width:430px){
 body{padding:9px}.header{top:6px;padding:14px}h1{font-size:22px}
 .sum{padding:8px 4px}.sum b{font-size:17px}.name{font-size:22px}.num{font-size:23px}
 .bottom-inner{display:block}.save{width:100%;margin-bottom:5px}.bottom-text{text-align:center}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>TAJIMA 生産管理</h1>
    <div class="month-row">
      <button class="btn-light" onclick="changeMonth(-1)">◀ 前月</button>
      <div class="month-title" id="monthTitle"></div>
      <button class="btn-light" onclick="changeMonth(1)">翌月 ▶</button>
    </div>
    <div id="saveState" class="state saved">保存済み</div>
  </div>

  <div class="summary">
    <div class="sum"><span>総受注数</span><b id="totalOrder">0</b></div>
    <div class="sum"><span>総完成品</span><b id="totalFinished">0</b></div>
    <div class="sum"><span>総残り</span><b id="totalRemaining">0</b></div>
  </div>

  <div class="toolbar">
    <input id="searchBox" class="search" placeholder="品番検索" oninput="draw()">
    <button class="btn-blue" onclick="addProduct()">＋ 品番追加</button>
    <button class="btn-light" onclick="copyPreviousMonth()">前月品番コピー</button>
  </div>

  <div id="cards"></div>

  <div class="actions">
    <button class="btn-light" onclick="resetCurrentMonth()">この月を初期化</button>
    <button class="btn-light" onclick="exportBackup()">バックアップ出力</button>
  </div>

  <div class="note">
    v1.0 現場入力版。基本品番 KMX / KRF / KMG / KRA / #81。<br>
    次版で社長・社員共有用のクラウド保存に進みます。
  </div>
</div>

<div class="bottom">
  <div class="bottom-inner">
    <button class="save" onclick="manualSave()">保存</button>
    <div id="bottomText" class="bottom-text">変更なし</div>
  </div>
</div>

<script>
const APP_KEY="tajima-production-v10";
const DEFAULT_PRODUCTS=[
  {name:"KMX",order:0,finished:0,step21:0,step1:0},
  {name:"KRF",order:0,finished:0,step21:0,step1:0},
  {name:"KMG",order:0,finished:0,step21:0,step1:0},
  {name:"KRA",order:0,finished:0,step21:0,step1:0},
  {name:"#81",order:0,finished:0,step21:0,step1:0}
];
let currentYear=2026,currentMonth=6,data=[],dirty=false;

function key(y=currentYear,m=currentMonth){return `${APP_KEY}-${y}-${String(m).padStart(2,"0")}`}
function clone(x){return JSON.parse(JSON.stringify(x))}
function num(v){const n=Number(v);return Number.isFinite(n)?n:0}
function esc(s){return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;")}

function loadMonth(){
  const saved=localStorage.getItem(key());
  data=saved?JSON.parse(saved):clone(DEFAULT_PRODUCTS);
  dirty=false;draw();setSaved();
}
function save(){localStorage.setItem(key(),JSON.stringify(data));dirty=false;setSaved()}
function manualSave(){save();toast("保存しました")}
function toast(msg){bottomText.textContent=msg;setTimeout(()=>{if(!dirty)bottomText.textContent="変更なし"},1200)}
function setDirty(){dirty=true;saveState.textContent="未保存";saveState.className="state dirty";bottomText.textContent="変更があります"}
function setSaved(){saveState.textContent="保存済み";saveState.className="state saved";bottomText.textContent="変更なし"}
function monthLabel(){monthTitle.textContent=`${currentYear}年${currentMonth}月`}

function changeMonth(diff){
  if(dirty&&!confirm("未保存の変更があります。保存せずに月を移動しますか？"))return;
  currentMonth+=diff;
  if(currentMonth<=0){currentMonth=12;currentYear--}
  if(currentMonth>=13){currentMonth=1;currentYear++}
  loadMonth();
}
function calcTotals(){
  let o=0,f=0;
  data.forEach(p=>{o+=num(p.order);f+=num(p.finished)});
  totalOrder.textContent=o;totalFinished.textContent=f;totalRemaining.textContent=o-f;
}
function updateName(i,v){data[i].name=v;setDirty()}
function updateNum(i,k,v){data[i][k]=num(v);setDirty();calcTotals();updateCardRemain(i)}
function updateCardRemain(i){
  const p=data[i],r=num(p.order)-num(p.finished);
  const rem=document.getElementById("rem-"+i), bar=document.getElementById("bar-"+i), rate=document.getElementById("rate-"+i);
  if(rem){rem.textContent=r<0?`超過 ${Math.abs(r)}`:`残り ${r}`;rem.className="remain "+(r<0?"over":"short")}
  const pct=num(p.order)>0?Math.min(100,Math.round(num(p.finished)/num(p.order)*100)):0;
  if(bar)bar.style.width=pct+"%";
  if(rate)rate.textContent=`進捗 ${pct}%`;
}
function addProduct(){data.push({name:"新規品番",order:0,finished:0,step21:0,step1:0});setDirty();draw()}
function deleteProduct(i){if(!confirm(`${data[i].name} を削除しますか？`))return;data.splice(i,1);setDirty();draw()}
function resetCurrentMonth(){if(!confirm(`${currentYear}年${currentMonth}月を初期化しますか？`))return;localStorage.removeItem(key());loadMonth()}
function copyPreviousMonth(){
  let y=currentYear,m=currentMonth-1;if(m<=0){m=12;y--}
  const prev=localStorage.getItem(`${APP_KEY}-${y}-${String(m).padStart(2,"0")}`);
  if(!prev){alert("前月データがありません");return}
  data=JSON.parse(prev).map(p=>({name:p.name,order:0,finished:0,step21:0,step1:0}));
  setDirty();draw();
}
function exportBackup(){
  const b=new Blob([JSON.stringify({year:currentYear,month:currentMonth,data},null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`TAJIMA-${currentYear}-${String(currentMonth).padStart(2,"0")}.json`;a.click();
}
function draw(){
  monthLabel();calcTotals();
  const q=(searchBox.value||"").toLowerCase();
  cards.innerHTML="";
  data.forEach((p,i)=>{
    if(q && !String(p.name).toLowerCase().includes(q))return;
    const r=num(p.order)-num(p.finished);
    const pct=num(p.order)>0?Math.min(100,Math.round(num(p.finished)/num(p.order)*100)):0;
    const c=document.createElement("div");c.className="card";
    c.innerHTML=`
      <div class="top">
        <input class="name" value="${esc(p.name)}" oninput="updateName(${i},this.value)">
        <button class="btn-red" onclick="deleteProduct(${i})">削除</button>
      </div>
      <div id="rem-${i}" class="remain ${r<0?'over':'short'}">${r<0?`超過 ${Math.abs(r)}`:`残り ${r}`}</div>
      <div class="progress"><div id="bar-${i}" class="bar" style="width:${pct}%"></div></div>
      <div id="rate-${i}" class="rate">進捗 ${pct}%</div>
      <div class="grid">
        <div class="field"><div class="label">受注数</div><input class="num" inputmode="numeric" value="${p.order}" oninput="updateNum(${i},'order',this.value)"></div>
        <div class="field"><div class="label">完成品</div><input class="num" inputmode="numeric" value="${p.finished}" oninput="updateNum(${i},'finished',this.value)"></div>
        <div class="field"><div class="label">工程2-1</div><input class="num" inputmode="numeric" value="${p.step21}" oninput="updateNum(${i},'step21',this.value)"></div>
        <div class="field"><div class="label">工程1</div><input class="num" inputmode="numeric" value="${p.step1}" oninput="updateNum(${i},'step1',this.value)"></div>
      </div>`;
    cards.appendChild(c);
  });
}
window.addEventListener("beforeunload",e=>{if(dirty){e.preventDefault();e.returnValue=""}});
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{})}
loadMonth();
</script>
</body>
</html>
